name: WhatsApp Follow-ups

# Cutuca clientes que ficaram um tempo sem responder + pós-venda (cada loja
# escolhe o tempo no painel). Chama um endpoint protegido que decide quem cutucar.
#
# ATENÇÃO: o agendamento automático agora roda pelo n8n (self-hosted no VPS da
# Evolution), pois o `schedule` do GitHub Actions é impreciso (dispara de 1 em
# 1h ou mais, não de 15 em 15 min) e a janela de follow-up é estreita, então ele
# perdia a janela quase sempre. O workflow do n8n faz um GET em
# /api/whatsapp/followups?key=<CRON_SECRET> a cada ~5 min. Este arquivo ficou só
# com o disparo MANUAL (botão "Run workflow"), como backup/depuração.

on:
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow"

jobs:
  followups:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de follow-up
        run: |
          echo "Disparando follow-ups..."
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            "${APP_BASE_URL%/}/api/whatsapp/followups?key=${CRON_SECRET}")
          echo "Status HTTP: $HTTP_CODE"
          cat /tmp/resp.txt; echo
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "OK."
          else
            echo "Falha (HTTP $HTTP_CODE)."
            exit 1
          fi
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
